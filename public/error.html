<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error | EV Connect 2026</title>
<style>
:root{--bg:#000;--card:#042621;--accent:#67B345;--text:#f3fde5;--muted:#9eb79a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#000;color:var(--text);font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;}
.container{max-width:720px;text-align:center;}
.logo{margin-bottom:24px;}
.logo img{width:120px;height:auto;}
h1{font-size:3rem;margin-bottom:16px;color:#f15e5e;}
p{color:var(--muted);line-height:1.8;margin-bottom:32px;}
a{display:inline-flex;padding:16px 28px;border-radius:999px;background:var(--accent);color:#000;font-weight:700;text-decoration:none;transition:transform .3s ease,opacity .3s ease;}
a:hover{transform:translateY(-3px);opacity:.92;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(103,179,69,0.15);padding:40px;border-radius:28px;box-shadow:0 20px 70px rgba(0,0,0,0.35);}
@media(max-width:600px){h1{font-size:2.4rem;}}
</style>
</head>
<body>
<div class="container card">
    <div class="logo"><img src="images/logo.svg" alt="EV Connect 2026"></div>
    <h1>Something Went Wrong</h1>
    <p>We couldn't complete your request. Please try again or reach out to the event team at contact@evurjaa.com.</p>
    <a href="/">Back to Home</a>
</div>
</body>
</html>
